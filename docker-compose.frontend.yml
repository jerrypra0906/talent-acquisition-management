# Frontend server deployment (ECS-App)
# This file is for FRONTEND SERVER ONLY - does not include backend, postgres, or redis
# Usage: docker-compose -f docker-compose.frontend.yml -p tas-production up -d
# Backend services should run on the backend server (ECS-DB) using docker-compose.network.yml

services:
  # Frontend (Admin Dashboard)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: tas_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - tas_network

  # Candidate Portal
  candidate-portal:
    build:
      context: ./candidate-portal
      dockerfile: Dockerfile
      target: production
    container_name: tas_candidate_portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - tas_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: tas_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.network.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - candidate-portal
    networks:
      - tas_network

networks:
  tas_network:
    driver: bridge

