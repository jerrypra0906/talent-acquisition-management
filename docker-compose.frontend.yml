# Frontend server deployment (ECS-App)
# This file is for FRONTEND SERVER ONLY - does not include backend, postgres, or redis
# Usage: docker-compose -f docker-compose.frontend.yml -p tas-production up -d
# Backend services should run on the backend server (ECS-DB) using docker-compose.network.yml

services:
  # Frontend (Admin Dashboard)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: tas_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Limit Node.js memory to prevent excessive usage
      NODE_OPTIONS: --max-old-space-size=512
      # Bind Next.js server to all interfaces (required for Docker networking)
      HOSTNAME: 0.0.0.0
      PORT: 3000
    # Resource limits to prevent 100% CPU usage
    # Note: Using Docker Compose v3.8 compatible syntax
    cpus: '1.0'           # Limit to 1 CPU core
    mem_limit: 1g         # Limit to 1GB RAM
    # Healthcheck to detect when frontend becomes unresponsive
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      tas_network:
        aliases:
          - frontend
          - tas_frontend

  # Candidate Portal
  candidate-portal:
    build:
      context: ./candidate-portal
      dockerfile: Dockerfile
      target: production
    container_name: tas_candidate_portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Limit Node.js memory to prevent excessive usage
      NODE_OPTIONS: --max-old-space-size=512
      # Bind Next.js server to all interfaces (required for Docker networking)
      HOSTNAME: 0.0.0.0
      PORT: 3000
    # Resource limits to prevent 100% CPU usage
    # Note: Using Docker Compose v3.8 compatible syntax
    cpus: '1.0'           # Limit to 1 CPU core
    mem_limit: 1g         # Limit to 1GB RAM
    # Healthcheck to detect when candidate-portal becomes unresponsive
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      tas_network:
        aliases:
          - candidate-portal
          - tas_candidate_portal

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: tas_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.network.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - candidate-portal
    networks:
      - tas_network
    # Healthcheck to detect when nginx can't reach upstreams
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  tas_network:
    driver: bridge

