version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tas_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tas_secure_password_change_this}
      POSTGRES_DB: tas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - tas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tas_user -d tas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tas_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password_change_this}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - tas_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: tas_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://tas_user:${POSTGRES_PASSWORD:-tas_secure_password_change_this}@postgres:5432/tas_db?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password_change_this}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password_change_this}
      # Provide safe defaults for local/docker dev if env vars are not set
      JWT_SECRET: ${JWT_SECRET:-change_this_dev_jwt_secret_64_chars_change_this_dev_jwt_secret_64}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_dev_refresh_secret_64_chars_change_this_dev_refresh}
      # Must be exactly 32 characters
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-12345678901234567890123456789012}
      FRONTEND_URL: http://localhost:4001
      CANDIDATE_PORTAL_URL: http://localhost:4002
      CORS_ORIGIN: http://localhost:4001,http://localhost:4002,http://172.30.63.129:4001,http://172.30.63.129:4002,http://172.30.60.122:4001,http://172.30.60.122:4002
      CORS_CREDENTIALS: true
      # Local dev convenience: avoid hitting in-memory rate limits (all requests appear from the Docker gateway IP)
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 5000
      RATE_LIMIT_LOGIN_WINDOW: 900000
      RATE_LIMIT_LOGIN_MAX: 200
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    ports:
      - "0.0.0.0:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tas_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Admin Dashboard)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: tas_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    ports:
      - "0.0.0.0:4001:3000"
    depends_on:
      - backend
    networks:
      - tas_network

  # Candidate Portal
  candidate-portal:
    build:
      context: ./candidate-portal
      dockerfile: Dockerfile
      target: production
    container_name: tas_candidate_portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    ports:
      - "0.0.0.0:4002:3000"
    depends_on:
      - backend
    networks:
      - tas_network

  # Nginx Reverse Proxy (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: tas_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - candidate-portal
    networks:
      - tas_network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tas_network:
    driver: bridge

